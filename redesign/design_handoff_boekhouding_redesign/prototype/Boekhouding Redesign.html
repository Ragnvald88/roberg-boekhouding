<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Boekhouding — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>/* ============================================================
   Boekhouding — calm, minimal, mono-accented design system
   ============================================================ */

:root {
  /* Palette — warm off-white with teal accent (tweakable) */
  --bg: #fafaf7;
  --bg-elev: #ffffff;
  --bg-sunk: #f5f4ef;
  --bg-hover: #f0efe9;
  --line: #e8e6df;
  --line-strong: #d8d5cc;
  --ink: #15171a;
  --ink-2: #3a3d43;
  --ink-3: #6b6f76;
  --ink-4: #9a9ea5;

  --accent: #0f766e;
  --accent-soft: #e6f2f0;
  --accent-ink: #0a524c;

  --pos: #0f766e;
  --neg: #b45309;
  --warn: #a16207;
  --info: #1e40af;

  /* Type */
  --f-sans: "Inter", "Söhne", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --f-mono: "JetBrains Mono", "Berkeley Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --f-serif: "Instrument Serif", "Source Serif Pro", ui-serif, Georgia, serif;

  /* Density (tweakable) */
  --pad: 20px;
  --pad-sm: 12px;
  --row-h: 44px;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;

  --shadow-sm: 0 1px 0 rgba(20, 20, 20, 0.02), 0 1px 2px rgba(20, 20, 20, 0.04);
  --shadow-md: 0 1px 0 rgba(20, 20, 20, 0.03), 0 8px 24px -12px rgba(20, 20, 20, 0.08);
  --shadow-lg: 0 30px 60px -20px rgba(20, 20, 20, 0.18), 0 12px 24px -12px rgba(20, 20, 20, 0.10);
}

[data-theme="dark"] {
  --bg: #0e0f11;
  --bg-elev: #17181b;
  --bg-sunk: #0a0b0c;
  --bg-hover: #1e2024;
  --line: #26282c;
  --line-strong: #35383d;
  --ink: #f2f1ec;
  --ink-2: #c9c7bf;
  --ink-3: #8d8f94;
  --ink-4: #5f6166;
  --accent: #2dd4bf;
  --accent-soft: #0d2f2c;
  --accent-ink: #5eead4;
  --pos: #2dd4bf;
  --neg: #f59e0b;
  --shadow-sm: 0 1px 0 rgba(0, 0, 0, 0.3);
  --shadow-md: 0 1px 0 rgba(0, 0, 0, 0.3), 0 10px 30px -12px rgba(0, 0, 0, 0.6);
  --shadow-lg: 0 30px 60px -20px rgba(0, 0, 0, 0.8), 0 12px 24px -12px rgba(0, 0, 0, 0.5);
}

/* Density modes */
[data-density="compact"] {
  --pad: 14px; --pad-sm: 8px; --row-h: 36px;
}
[data-density="spacious"] {
  --pad: 28px; --pad-sm: 16px; --row-h: 52px;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-sans);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "cv11", "ss01";
}
button, input, select, textarea { font: inherit; color: inherit; }

.mono { font-family: var(--f-mono); font-feature-settings: "tnum", "zero"; letter-spacing: -0.01em; }
.serif { font-family: var(--f-serif); }
.num { font-family: var(--f-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

/* ============ APP SHELL ============ */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  height: 100vh;
  overflow: hidden;
}
[data-nav="compact"] .app { grid-template-columns: 60px 1fr; }

.sidebar {
  background: var(--bg);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  padding: 18px 12px;
  gap: 2px;
  overflow-y: auto;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 10px 22px;
  font-family: var(--f-mono);
  font-size: 13px;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.brand .dot {
  width: 20px; height: 20px; border-radius: 5px;
  background: var(--ink);
  color: var(--bg);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
}
.brand .kbd {
  margin-left: auto;
  font-size: 10px;
  padding: 2px 5px;
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--ink-3);
}

.nav-section {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-4);
  padding: 16px 10px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  color: var(--ink-2);
  cursor: pointer;
  font-size: 13px;
  user-select: none;
  position: relative;
}
.nav-item:hover { background: var(--bg-hover); color: var(--ink); }
.nav-item.active { background: var(--bg-elev); color: var(--ink); box-shadow: var(--shadow-sm); border: 1px solid var(--line); }
.nav-item .count {
  margin-left: auto;
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--ink-4);
  background: var(--bg-sunk);
  padding: 1px 6px;
  border-radius: 4px;
}
.nav-item.active .count { background: var(--accent-soft); color: var(--accent-ink); }
.nav-ic { width: 16px; height: 16px; color: var(--ink-3); flex-shrink: 0; }
.nav-item.active .nav-ic { color: var(--accent); }

.sidebar-foot {
  margin-top: auto;
  padding: 12px 10px;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
  font-size: 12px;
  color: var(--ink-3);
}
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #1c1917);
  color: white; display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
}

/* ============ MAIN ============ */
.main { overflow-y: auto; overflow-x: hidden; background: var(--bg); }
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 32px;
  border-bottom: 1px solid var(--line);
  background: color-mix(in srgb, var(--bg) 80%, transparent);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 10;
}
.crumbs {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--f-mono);
  font-size: 12px;
  color: var(--ink-3);
}
.crumbs .cur { color: var(--ink); }
.crumbs .sep { color: var(--ink-4); }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.content { padding: 32px 32px 80px; max-width: 1320px; }
[data-density="compact"] .content { padding: 22px 22px 60px; }

/* ============ PRIMITIVES ============ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  color: var(--ink);
  cursor: pointer;
  font-size: 13px;
  transition: background 0.1s;
}
.btn:hover { background: var(--bg-hover); }
.btn-primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.btn-primary:hover { background: var(--ink-2); }
.btn-accent {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn-accent:hover { filter: brightness(1.05); }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--bg-hover); }
.btn .kbd {
  font-family: var(--f-mono);
  font-size: 10px;
  padding: 1px 4px;
  border: 1px solid currentColor;
  border-radius: 3px;
  opacity: 0.5;
  margin-left: 4px;
}

.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 99px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  background: var(--bg-sunk);
  color: var(--ink-3);
  border: 1px solid var(--line);
}
.chip.pos { background: var(--accent-soft); color: var(--accent-ink); border-color: transparent; }
.chip.neg { background: #fef3c7; color: #854d0e; border-color: transparent; }
.chip.warn { background: #fef3c7; color: #854d0e; border-color: transparent; }
.chip.info { background: #e0e7ff; color: #3730a3; border-color: transparent; }
[data-theme="dark"] .chip.neg { background: #422006; color: #fbbf24; }
[data-theme="dark"] .chip.warn { background: #422006; color: #fbbf24; }
[data-theme="dark"] .chip.info { background: #1e1b4b; color: #a5b4fc; }

.card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: var(--pad);
}
.card-tight { padding: var(--pad-sm) var(--pad); }

.row { display: flex; align-items: center; gap: 12px; }
.col { display: flex; flex-direction: column; gap: 12px; }
.muted { color: var(--ink-3); }
.tiny { font-size: 11px; }
.eyebrow {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.hr { border: 0; border-top: 1px solid var(--line); margin: 0; }

.input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  border-radius: 7px;
  font-size: 13px;
  transition: border-color 0.1s;
}
.input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

/* ============ DASHBOARD ============ */
.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 28px;
  gap: 24px;
  flex-wrap: wrap;
}
.page-title {
  font-family: var(--f-serif);
  font-size: 34px;
  font-weight: 400;
  letter-spacing: -0.02em;
  margin: 0;
  line-height: 1;
}
.page-sub {
  font-family: var(--f-mono);
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 10px;
}

.hero-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 20px;
}
.hero-cell {
  background: var(--bg-elev);
  padding: 24px 24px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
}
.hero-cell.primary { padding: 28px 28px 26px; }
.hero-label {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.hero-value {
  font-family: var(--f-mono);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--ink);
}
.hero-cell.primary .hero-value { font-size: 52px; margin: 6px 0 4px; }
.hero-cell .hero-value { font-size: 30px; margin: 6px 0 4px; }
.hero-sub { font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 8px; }
.hero-spark { margin-top: auto; height: 44px; }
.hero-cell.primary .hero-spark { height: 64px; }

/* Progress bar for urencriterium */
.uren-card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px 24px;
  display: grid;
  grid-template-columns: 2fr 3fr;
  gap: 28px;
  align-items: center;
  margin-bottom: 20px;
}
.uren-bar {
  position: relative;
  height: 36px;
  background: var(--bg-sunk);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--line);
}
.uren-fill {
  position: absolute; inset: 0 auto 0 0;
  background: var(--accent);
  transition: width 0.6s ease;
}
.uren-target {
  position: absolute; top: -4px; bottom: -4px;
  width: 2px;
  background: var(--ink);
}
.uren-target::after {
  content: "1225";
  position: absolute;
  left: 50%; transform: translateX(-50%);
  top: -18px;
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--ink);
  white-space: nowrap;
}
.uren-ticks {
  display: flex; justify-content: space-between;
  margin-top: 6px;
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--ink-4);
}

/* Two-col dashboard area */
.dash-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}
.chart-card { padding: 22px 24px 20px; }
.chart-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 18px;
}
.chart-title { font-size: 14px; font-weight: 500; color: var(--ink); }
.chart-legend {
  display: flex; gap: 14px;
  font-family: var(--f-mono); font-size: 11px; color: var(--ink-3);
}
.legend-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 5px; }

/* Overdue list */
.invoice-list { display: flex; flex-direction: column; gap: 0; }
.invoice-row {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px dashed var(--line);
  font-size: 13px;
}
.invoice-row:last-child { border-bottom: 0; }
.invoice-row .due {
  font-family: var(--f-mono); font-size: 11px; color: var(--neg); min-width: 58px;
}
.invoice-row .client { color: var(--ink); }
.invoice-row .num { color: var(--ink); font-size: 13px; }

/* Activity feed */
.activity { display: flex; flex-direction: column; }
.activity-row {
  display: grid; grid-template-columns: 72px 1fr auto; gap: 16px; align-items: center;
  padding: 10px 0;
  border-bottom: 1px dashed var(--line);
}
.activity-row:last-child { border-bottom: 0; }
.activity-row .when { font-family: var(--f-mono); font-size: 11px; color: var(--ink-4); }
.activity-row .what { font-size: 13px; color: var(--ink-2); }
.activity-row .amount { font-family: var(--f-mono); font-size: 12px; color: var(--ink); }
.activity-row .amount.neg { color: var(--neg); }

/* ============ TABLE ============ */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.tbl thead th {
  text-align: left;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-4);
  font-weight: 500;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-sunk);
}
.tbl tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  color: var(--ink-2);
}
.tbl tbody tr:hover { background: var(--bg-hover); cursor: pointer; }
.tbl tbody tr.selected { background: var(--accent-soft); }
.tbl tbody tr:last-child td { border-bottom: 0; }
.tbl td.num, .tbl th.num { text-align: right; font-family: var(--f-mono); font-variant-numeric: tabular-nums; color: var(--ink); }

/* ============ COMMAND PALETTE ============ */
.cmdk-overlay {
  position: fixed; inset: 0;
  background: rgba(10, 10, 10, 0.3);
  backdrop-filter: blur(3px);
  display: grid; place-items: flex-start center;
  padding-top: 14vh;
  z-index: 100;
  animation: fade 0.12s ease;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.cmdk {
  width: 620px; max-width: 90vw;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.cmdk-input {
  width: 100%;
  border: 0; outline: 0;
  padding: 16px 20px;
  font-size: 15px;
  background: transparent;
  border-bottom: 1px solid var(--line);
  font-family: var(--f-sans);
}
.cmdk-list { max-height: 420px; overflow-y: auto; padding: 6px; }
.cmdk-group {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-4);
  padding: 10px 10px 4px;
}
.cmdk-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
.cmdk-item.active { background: var(--bg-hover); }
.cmdk-item .ic { width: 16px; color: var(--ink-3); }
.cmdk-item .shortcut {
  margin-left: auto;
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--ink-4);
  display: flex; gap: 3px;
}
.cmdk-item .shortcut span {
  padding: 1px 5px;
  border: 1px solid var(--line);
  border-radius: 3px;
}
.cmdk-foot {
  padding: 8px 14px;
  border-top: 1px solid var(--line);
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--ink-4);
  display: flex; gap: 16px;
  background: var(--bg-sunk);
}

/* ============ DROPZONE ============ */
.dropzone {
  border: 1.5px dashed var(--line-strong);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  background: var(--bg-sunk);
  color: var(--ink-3);
  transition: all 0.15s;
}
.dropzone.hot { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-ink); }

/* ============ FACTUUR BUILDER ============ */
.builder { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.line-item {
  display: grid;
  grid-template-columns: 2fr 60px 80px 80px 24px;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px dashed var(--line);
}
.line-item input { border: 0; background: transparent; padding: 4px 6px; border-radius: 4px; }
.line-item input:focus { outline: 0; background: var(--bg-sunk); }
.line-item input.num { text-align: right; }

.preview-doc {
  background: white;
  border-radius: var(--radius);
  padding: 36px 40px;
  box-shadow: var(--shadow-md);
  color: #15171a;
  aspect-ratio: 210 / 297;
  font-size: 11px;
}
[data-theme="dark"] .preview-doc { color: #15171a; }

/* ============ BANK RECONCILE ============ */
.bank-split {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-elev);
}
.bank-col { padding: 12px; }
.bank-col + .bank-col { border-left: 1px solid var(--line); }
.bank-col h4 {
  margin: 0 0 10px;
  font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--ink-3); font-weight: 500;
  display: flex; justify-content: space-between;
}
.bank-item {
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 7px;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
  background: var(--bg-elev);
  transition: all 0.1s;
}
.bank-item:hover { border-color: var(--line-strong); }
.bank-item.matched { border-color: var(--accent); background: var(--accent-soft); }
.bank-item.selected { border-color: var(--ink); box-shadow: 0 0 0 2px var(--bg-sunk), 0 0 0 3px var(--ink); }
.bank-item .desc { flex: 1; font-size: 13px; }
.bank-item .sub { font-size: 11px; color: var(--ink-3); font-family: var(--f-mono); }
.bank-item .amt { font-family: var(--f-mono); font-size: 13px; }
.bank-item .amt.neg { color: var(--neg); }
.bank-item .amt.pos { color: var(--pos); }

/* ============ TWEAKS ============ */
.tweaks {
  position: fixed; right: 20px; bottom: 20px;
  width: 280px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  z-index: 50;
  overflow: hidden;
  font-size: 12px;
}
.tweaks-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-3);
}
.tweaks-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }
.tweak-row { display: flex; flex-direction: column; gap: 6px; }
.tweak-row label { color: var(--ink-3); font-size: 11px; font-family: var(--f-mono); text-transform: uppercase; letter-spacing: 0.08em; }
.seg { display: flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
.seg button {
  flex: 1; padding: 5px 8px;
  border: 0; background: var(--bg-elev);
  font-size: 11px; color: var(--ink-2); cursor: pointer;

const Sparkline = ({ data, color, height = 44, fill = false }) => {
  const w = 220, h = height, pad = 2;
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = pad + (1 - (v - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  const fillD = fill ? `${d} L${pts[pts.length-1][0]} ${h} L${pts[0][0]} ${h} Z` : '';
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none">
      {fill && <path d={fillD} fill={color} opacity="0.08"/>}
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>

  );
};

  if (overdue) return <span className="chip neg">verlopen</span>;
  if (status === 'concept') return <span className="chip">concept</span>;
  if (status === 'verstuurd') return <span className="chip info">verstuurd</span>;
  if (status === 'betaald') return <span className="chip pos">betaald</span>;
  return <span className="chip">{status}</span>;
};
window.StatusChip = StatusChip;

// ============ WERKDAGEN ============
const Werkdagen = ({ setRoute }) => {
  const [selected, setSelected] = useState(new Set());

    if (filter === 'anw') return r.filter(w => w.code === 'ANW');
    return r;
  }, [filter]);

  const toggle = (id) => {
    const n = new Set(selected);
    n.has(id) ? n.delete(id) : n.add(id);
    setSelected(n);
  };
  const selTotal = rows.filter(r => selected.has(r.id)).reduce((a, r) => a + r.uren * r.tarief + r.km * r.km_tarief, 0);
  const selUren = rows.filter(r => selected.has(r.id)).reduce((a, r) => a + r.uren, 0);

  return (

          {[
            { k: 'all', l: 'Alle' },
            { k: 'uninvoiced', l: 'Ongefactureerd' },
            { k: 'anw', l: 'ANW' },
          ].map(f => (
            <button key={f.k} onClick={() => setFilter(f.k)} className={filter === f.k ? 'on' : ''} style={{
              padding: '7px 14px', border: 0, borderRight: '1px solid var(--line)',
              background: filter === f.k ? 'var(--ink)' : 'var(--bg-elev)',
              color: filter === f.k ? 'var(--bg)' : 'var(--ink-2)',

        </div>
      </div>

      {/* Selection action bar */}
      {selected.size > 0 && (
        <div style={{
          position: 'sticky', top: 60, zIndex: 5,
          background: 'var(--ink)', color: 'var(--bg)',
          padding: '10px 20px', borderRadius: 10, marginBottom: 16,

// ============ FACTUREN ============
const Facturen = ({ setRoute }) => {

    if (filter === 'open') r = r.filter(f => f.status === 'verstuurd');

    if (filter === 'concept') r = r.filter(f => f.status === 'concept');
    if (q) r = r.filter(f => f.klant_naam.toLowerCase().includes(q.toLowerCase()) || f.nummer.includes(q));
    return r;
  }, [filter, q]);

  const totals = {
    all: FACTUREN.reduce((a, f) => a + f.totaal, 0),

    verlopen: FACTUREN.filter(f => f.overdue).reduce((a, f) => a + f.totaal, 0),
    concept: FACTUREN.filter(f => f.status === 'concept').reduce((a, f) => a + f.totaal, 0),

  return (
    <div className="content">

/* global React, ReactDOM, Ic, APPDATA, Dashboard, Werkdagen, Facturen, Kosten, Bank, FactuurBuilder */

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "normal",
  "accent": "teal",
  "nav": "expanded",
  "font": "inter"
}/*EDITMODE-END*/;

const ACCENTS = {
  teal:   { light: { accent: '#0f766e', soft: '#e6f2f0', ink: '#0a524c' }, dark: { accent: '#2dd4bf', soft: '#0d2f2c', ink: '#5eead4' } },
  indigo: { light: { accent: '#4338ca', soft: '#e0e7ff', ink: '#312e81' }, dark: { accent: '#818cf8', soft: '#1e1b4b', ink: '#a5b4fc' } },
  amber:  { light: { accent: '#b45309', soft: '#fef3c7', ink: '#78350f' }, dark: { accent: '#fbbf24', soft: '#422006', ink: '#fcd34d' } },
  slate:  { light: { accent: '#334155', soft: '#e2e8f0', ink: '#0f172a' }, dark: { accent: '#94a3b8', soft: '#1e293b', ink: '#cbd5e1' } },
  rose:   { light: { accent: '#be123c', soft: '#ffe4e6', ink: '#881337' }, dark: { accent: '#fb7185', soft: '#4c0519', ink: '#fda4af' } },
};

const FONTS = {
  inter:  { body: 'Inter, ui-sans-serif, system-ui, sans-serif' },
  geist:  { body: '"Geist", Inter, ui-sans-serif, sans-serif' },
  ibm:    { body: '"IBM Plex Sans", Inter, ui-sans-serif, sans-serif' },
  helv:   { body: '"Helvetica Neue", Helvetica, Arial, sans-serif' },
};

const App = () => {
  const [route, setRoute] = useState('dashboard');
  const [cmdk, setCmdk] = useState(false);
  const [cmdQ, setCmdQ] = useState('');
  const [cmdIdx, setCmdIdx] = useState(0);
  const [cfg, setCfg] = useState(DEFAULTS);
  const [tweaks, setTweaks] = useState(false);

  // Apply theme/density
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', cfg.theme);
    document.documentElement.setAttribute('data-density', cfg.density);
    document.documentElement.setAttribute('data-nav', cfg.nav);
    const acc = ACCENTS[cfg.accent][cfg.theme === 'dark' ? 'dark' : 'light'];
    document.documentElement.style.setProperty('--accent', acc.accent);
    document.documentElement.style.setProperty('--accent-soft', acc.soft);
    document.documentElement.style.setProperty('--accent-ink', acc.ink);
    document.documentElement.style.setProperty('--f-sans', FONTS[cfg.font].body);
  }, [cfg]);

  // Keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setCmdk(v => !v); setCmdQ(''); setCmdIdx(0); }
      if (e.key === 'Escape') setCmdk(false);
      if (!cmdk && !e.metaKey && !e.ctrlKey && !e.target.matches('input,textarea,select')) {
        if (e.key === 'f') { e.preventDefault(); setRoute('factuur_new'); }
        if (e.key === 'w') { e.preventDefault(); setRoute('werkdagen'); }
        if (e.key === 'd') { e.preventDefault(); setRoute('dashboard'); }
        if (e.key === 'b') { e.preventDefault(); setRoute('bank'); }
      }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [cmdk]);

  // Edit-mode bridge for Tweaks toolbar
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaks(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setCfgKey = (k, v) => {
    const next = { ...cfg, [k]: v };
    setCfg(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const navGroups = [
    { label: 'Boekhouden', items: [
      { k: 'dashboard', l: 'Dashboard', ic: Ic.dashboard },
      { k: 'werkdagen', l: 'Werkdagen', ic: Ic.calendar, count: APPDATA.WERKDAGEN.filter(w => !w.factuurnummer).length },
      { k: 'facturen', l: 'Facturen', ic: Ic.invoice, count: APPDATA.FACTUREN.filter(f => f.status === 'concept').length || null },
      { k: 'kosten', l: 'Kosten', ic: Ic.cost },
      { k: 'bank', l: 'Bank', ic: Ic.bank, count: APPDATA.BANKTRX.filter(t => !t.categorie && !t.matched).length },
    ]},
    { label: 'Archief', items: [
      { k: 'docs', l: 'Documenten', ic: Ic.docs },
      { k: 'jaar', l: 'Jaarafsluiting', ic: Ic.archive },
      { k: 'aangifte', l: 'Aangifte', ic: Ic.tax },
    ]},
    { label: 'Beheer', items: [
      { k: 'klanten', l: 'Klanten', ic: Ic.users },
      { k: 'settings', l: 'Instellingen', ic: Ic.settings },
    ]},
  ];

  const pageTitles = {
    dashboard: 'Dashboard', werkdagen: 'Werkdagen', facturen: 'Facturen',
    kosten: 'Kosten', bank: 'Bank', docs: 'Documenten', jaar: 'Jaarafsluiting',
    aangifte: 'Aangifte', klanten: 'Klanten', settings: 'Instellingen',
    factuur_new: 'Facturen / Nieuw',
  };

  const cmdItems = [
    { group: 'Acties', icon: Ic.plus, label: 'Nieuwe werkdag', shortcut: ['W'], go: () => setRoute('werkdagen') },
    { group: 'Acties', icon: Ic.plus, label: 'Nieuwe factuur', shortcut: ['F'], go: () => setRoute('factuur_new') },
    { group: 'Acties', icon: Ic.plus, label: 'Nieuwe uitgave', shortcut: [], go: () => setRoute('kosten') },
    { group: 'Acties', icon: Ic.upload, label: 'Importeer Rabobank CSV', shortcut: [], go: () => setRoute('bank') },
    { group: 'Acties', icon: Ic.upload, label: 'Importeer factuur-PDF', shortcut: [], go: () => setRoute('facturen') },
    { group: 'Navigatie', icon: Ic.dashboard, label: 'Ga naar Dashboard', shortcut: ['D'], go: () => setRoute('dashboard') },
    { group: 'Navigatie', icon: Ic.calendar, label: 'Ga naar Werkdagen', shortcut: ['W'], go: () => setRoute('werkdagen') },
    { group: 'Navigatie', icon: Ic.invoice, label: 'Ga naar Facturen', shortcut: ['F'], go: () => setRoute('facturen') },
    { group: 'Navigatie', icon: Ic.bank, label: 'Ga naar Bank', shortcut: ['B'], go: () => setRoute('bank') },
    { group: 'Aangifte', icon: Ic.tax, label: 'Aangifte-overzicht 2026', shortcut: [], go: () => setRoute('aangifte') },
    { group: 'Aangifte', icon: Ic.archive, label: 'Jaarafsluiting 2025 bekijken', shortcut: [], go: () => setRoute('jaar') },
    { group: 'Klanten', icon: Ic.users, label: 'Nieuwe klant toevoegen', shortcut: [], go: () => setRoute('klanten') },
    ...APPDATA.KLANTEN.slice(0, 4).map(k => ({
      group: 'Klanten', icon: Ic.users, label: k.naam, shortcut: [], go: () => setRoute('klanten')
    })),
  ];
  const filteredCmd = cmdQ ? cmdItems.filter(i => i.label.toLowerCase().includes(cmdQ.toLowerCase())) : cmdItems;

  const runCmd = (i) => { filteredCmd[i]?.go(); setCmdk(false); };

  return (
    <div className="app" data-screen-label={pageTitles[route] || route}>
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="brand">
          <div className="dot">B</div>
          {cfg.nav === 'expanded' && <>
            <div>
              <div style={{ fontWeight: 600 }}>Boekhouding</div>
              <div style={{ color: 'var(--ink-4)', fontSize: 10 }}>R.P. Berg — Huisarts</div>
            </div>
          </>}
        </div>

        <button className="nav-item" onClick={() => { setCmdk(true); setCmdQ(''); setCmdIdx(0); }} style={{ marginBottom: 8 }}>
          <Ic.search className="nav-ic"/>
          {cfg.nav === 'expanded' && <>
            <span style={{ color: 'var(--ink-3)' }}>Zoeken</span>
            <span className="count" style={{ fontSize: 9 }}>⌘K</span>
          </>}
        </button>

        {navGroups.map(g => (
          <React.Fragment key={g.label}>
            {cfg.nav === 'expanded' && <div className="nav-section">{g.label}</div>}
            {g.items.map(item => (
              <div key={item.k}
                className={`nav-item ${route === item.k || (route === 'factuur_new' && item.k === 'facturen') ? 'active' : ''}`}
                onClick={() => setRoute(item.k)}
                title={item.l}>
                <item.ic className="nav-ic"/>
                {cfg.nav === 'expanded' && <>
                  <span>{item.l}</span>
                  {item.count ? <span className="count">{item.count}</span> : null}
                </>}
              </div>
            ))}
          </React.Fragment>
        ))}

        <div className="sidebar-foot">
          <div className="avatar">RB</div>
          {cfg.nav === 'expanded' && (
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ color: 'var(--ink)', fontSize: 12, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>R.P. Berg</div>
              <div style={{ fontSize: 10 }} className="mono">fiscaal jaar 2026</div>
            </div>
          )}
        </div>
      </aside>

      {/* MAIN */}
      <main className="main">
        <div className="topbar">
          <div className="crumbs">
            <span>Boekhouding</span>
            <span className="sep">/</span>
            <span className="cur">{pageTitles[route]}</span>
          </div>
          <div className="topbar-right">
            <button className="btn btn-ghost" onClick={() => { setCmdk(true); setCmdQ(''); setCmdIdx(0); }}>
              <Ic.search style={{ width: 14, height: 14 }}/>
              <span style={{ color: 'var(--ink-3)', fontSize: 12 }}>Zoek of begin te typen</span>
              <span className="kbd">⌘K</span>
            </button>
          </div>
        </div>

        {route === 'dashboard' && <Dashboard setRoute={setRoute}/>}
        {route === 'werkdagen' && <Werkdagen setRoute={setRoute}/>}
        {route === 'facturen' && <Facturen setRoute={setRoute}/>}
        {route === 'factuur_new' && <FactuurBuilder setRoute={setRoute}/>}
        {route === 'kosten' && <Kosten/>}
        {route === 'bank' && <Bank/>}
        {['docs', 'jaar', 'aangifte', 'klanten', 'settings'].includes(route) && <Placeholder title={pageTitles[route]}/>}
      </main>

      {/* COMMAND PALETTE */}
      {cmdk && (
        <div className="cmdk-overlay" onClick={() => setCmdk(false)}>
          <div className="cmdk" onClick={e => e.stopPropagation()}>
            <input
              className="cmdk-input"
              placeholder="Zoek acties, klanten, facturen…"
              autoFocus
              value={cmdQ}
              onChange={e => { setCmdQ(e.target.value); setCmdIdx(0); }}
              onKeyDown={e => {
                if (e.key === 'ArrowDown') { e.preventDefault(); setCmdIdx(Math.min(filteredCmd.length - 1, cmdIdx + 1)); }
                if (e.key === 'ArrowUp') { e.preventDefault(); setCmdIdx(Math.max(0, cmdIdx - 1)); }
                if (e.key === 'Enter') { e.preventDefault(); runCmd(cmdIdx); }
              }}
            />
            <div className="cmdk-list">
              {(() => {
                let lastGroup = '';
                return filteredCmd.map((item, i) => {
                  const g = item.group !== lastGroup ? item.group : null;
                  lastGroup = item.group;
                  return (
                    <React.Fragment key={i}>
                      {g && <div className="cmdk-group">{g}</div>}
                      <div className={`cmdk-item ${i === cmdIdx ? 'active' : ''}`} onClick={() => runCmd(i)} onMouseEnter={() => setCmdIdx(i)}>
                        <item.icon className="ic"/>
                        <span>{item.label}</span>
                        {item.shortcut.length > 0 && <div className="shortcut">{item.shortcut.map((s, j) => <span key={j}>{s}</span>)}</div>}
                      </div>
                    </React.Fragment>
                  );
                });
              })()}
              {filteredCmd.length === 0 && (
                <div className="cmdk-item" style={{ color: 'var(--ink-4)' }}>Geen resultaten voor "{cmdQ}"</div>
              )}
            </div>
            <div className="cmdk-foot">
              <span>↑↓ navigeren</span>
              <span>↵ kies</span>
              <span>esc sluiten</span>
            </div>
          </div>
        </div>
      )}

      {/* TWEAKS */}
      {tweaks && (
        <div className="tweaks">
          <div className="tweaks-head">
            <span>Tweaks</span>
            <button className="btn btn-ghost" style={{ padding: 2 }} onClick={() => setTweaks(false)}>
              <Ic.x style={{ width: 12, height: 12 }}/>
            </button>
          </div>
          <div className="tweaks-body">
            <div className="tweak-row">
              <label>Thema</label>
              <div className="seg">
                <button className={cfg.theme === 'light' ? 'on' : ''} onClick={() => setCfgKey('theme', 'light')}>Licht</button>
                <button className={cfg.theme === 'dark' ? 'on' : ''} onClick={() => setCfgKey('theme', 'dark')}>Donker</button>
              </div>
            </div>
            <div className="tweak-row">
              <label>Accent</label>
              <div className="swatches">
                {Object.keys(ACCENTS).map(a => (
                  <div key={a}
                    onClick={() => setCfgKey('accent', a)}
                    className={`swatch ${cfg.accent === a ? 'on' : ''}`}
                    style={{ background: ACCENTS[a][cfg.theme === 'dark' ? 'dark' : 'light'].accent }}
                  />
                ))}
              </div>
            </div>
            <div className="tweak-row">
              <label>Dichtheid</label>
              <div className="seg">
                <button className={cfg.density === 'compact' ? 'on' : ''} onClick={() => setCfgKey('density', 'compact')}>Compact</button>
                <button className={cfg.density === 'normal' ? 'on' : ''} onClick={() => setCfgKey('density', 'normal')}>Normaal</button>
                <button className={cfg.density === 'spacious' ? 'on' : ''} onClick={() => setCfgKey('density', 'spacious')}>Ruim</button>
              </div>
            </div>
            <div className="tweak-row">
              <label>Navigatie</label>
              <div className="seg">
                <button className={cfg.nav === 'expanded' ? 'on' : ''} onClick={() => setCfgKey('nav', 'expanded')}>Volledig</button>
                <button className={cfg.nav === 'compact' ? 'on' : ''} onClick={() => setCfgKey('nav', 'compact')}>Smal</button>
              </div>
            </div>
            <div className="tweak-row">
              <label>Font</label>
              <div className="seg">
                <button className={cfg.font === 'inter' ? 'on' : ''} onClick={() => setCfgKey('font', 'inter')}>Inter</button>
                <button className={cfg.font === 'geist' ? 'on' : ''} onClick={() => setCfgKey('font', 'geist')}>Geist</button>
                <button className={cfg.font === 'ibm' ? 'on' : ''} onClick={() => setCfgKey('font', 'ibm')}>IBM Plex</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const Placeholder = ({ title }) => (
  <div className="content">
    <div className="page-head">
      <div>
        <h1 className="page-title">{title}</h1>
        <div className="page-sub">Deze sectie is in de redesign-prototype nog niet uitgewerkt.</div>
      </div>
    </div>
    <div className="card" style={{ padding: 60, textAlign: 'center' }}>
      <div style={{ display: 'grid', placeItems: 'center', height: 60, color: 'var(--ink-4)' }}>
        <Ic.inbox style={{ width: 32, height: 32 }}/>
      </div>
      <div className="mono tiny muted mt-12">Vraag een vervolg om {title.toLowerCase()} te ontwerpen</div>
    </div>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>
</body>
</html>
